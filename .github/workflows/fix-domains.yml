name: Fix Vercel Domains + Webhook Secret (one-time)
on:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-domains.yml']
env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Find project with vargasjr.dev domain
        run: |
          echo "=== All projects ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=20" \
            | python3 -c "import json,sys; [print(p['id'], p['name']) for p in json.load(sys.stdin).get('projects',[])]"
          echo "=== Domain lookup ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v5/domains/vargasjr.dev" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('domain:', d.get('name'), 'projectId:', d.get('projectId'))"
          echo "=== Existing RESEND_WEBHOOK_SECRET IDs ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env" \
            | python3 -c "import json,sys; [print(e['key'], e['id']) for e in json.load(sys.stdin).get('envs',[]) if 'RESEND' in e.get('key','')]"

      - name: Fix domain redirect direction
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v9/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/domains/www.vargasjr.dev" \
            -d '{"redirect":"vargasjr.dev","redirectStatusCode":308}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d)"

      - name: Update RESEND_WEBHOOK_SECRET (delete by ID then recreate)
        run: |
          ENV_ID=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env" \
            | python3 -c "import json,sys; envs=json.load(sys.stdin).get('envs',[]); print(next((e['id'] for e in envs if e.get('key')=='RESEND_WEBHOOK_SECRET'),''))")
          echo "Deleting env id: $ENV_ID"
          curl -s -X DELETE \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env/$ENV_ID" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('deleted:', d.get('key', d))"
          echo "Creating new secret..."
          curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env" \
            -d "{\"key\":\"RESEND_WEBHOOK_SECRET\",\"value\":\"$NEW_SECRET\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('created:', 'created' in d)"
        env:
          NEW_SECRET: ${{ secrets.NEW_RESEND_WEBHOOK_SECRET }}
