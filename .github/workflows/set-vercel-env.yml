name: Set Vercel DB URL (one-time)
on:
  workflow_dispatch:
jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Push POSTGRES_URL to Vercel
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env" \
            -d "{\"key\":\"POSTGRES_URL\",\"value\":\"$POSTGRES_URL\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('result:', d.get('key') or d)"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
