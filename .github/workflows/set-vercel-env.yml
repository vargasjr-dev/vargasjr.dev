name: Set Vercel Env Vars (one-time)

on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Set RESEND_WEBHOOK_SECRET via Vercel REST API
        run: |
          # Look up the project ID by name
          PROJECT_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/vargasjr.dev" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['id'])")
          echo "Project ID: $PROJECT_ID"

          # Add the env var (upsert)
          curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
            -d "{\"key\":\"RESEND_WEBHOOK_SECRET\",\"value\":\"$SECRET\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\"]}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('created:', d.get('key','?'), d.get('id','error:' + str(d)))"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
