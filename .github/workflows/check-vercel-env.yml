name: Check Vercel Env Keys (one-time)
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List Vercel env var keys
        run: |
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/prj_iTErTbKE9stJyJbYQmTJNexAOYyo/env" \
            | python3 -c "import json,sys; [print(e['key']) for e in json.load(sys.stdin).get('envs',[])]"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
