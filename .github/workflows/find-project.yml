name: Find Real Vercel Project (one-time)
on:
  push:
    branches: [main]
    paths: ['.github/workflows/find-project.yml']
env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Check www domain and try vargas-jr team
        run: |
          echo "=== www.vargasjr.dev domain info ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v5/domains/www.vargasjr.dev" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d)"
          echo "=== Try teamId vargas-jr ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?teamId=vargas-jr&limit=10" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); [print(p['id'],p['name']) for p in d.get('projects',[])] if 'projects' in d else print(d)"
          echo "=== Try all team_* IDs for projects ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects?limit=100" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); [print(p['id'],p['name'],p.get('accountId')) for p in d.get('projects',[])]"
          echo "=== Check user info ==="
          curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); u=d.get('user',{}); print(u.get('name'),u.get('username'),u.get('id'))"
